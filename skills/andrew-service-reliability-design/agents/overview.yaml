positioning: |
  此 domain 聚焦在 service reliability 與 quality control 的設計，不混進 API lifecycle、
  security policy、permission model 與微服務平台治理等其他專屬領域內容。它的定位是從
  service promise、SLO/SLI、bottleneck 與 workload control 出發，建立一套可設計、
  可監控、可營運的服務品質保證方法。
main_flow:
  description: |
    主流程從服務承諾與可量測目標開始，逐步收斂到 bottleneck/workload model、admission
    control、queue semantics、observability 與 ops response，最後再用可量測 POC 驗證
    overload 行為與控制策略是否真的有效。
  steps:
    - "Problem Analysis"
    - "Service Objective Model"
    - "Bottleneck And Workload Model"
    - "Capacity Control And Admission"
    - "Queue And Lineup Design"
    - "Observability And Metrics"
    - "Operational Controls And Response"
    - "POC"
    - "Evaluation"
  ascii_chart: |
    +----------------------------------+
    | Problem Analysis                 |
    +----------------------------------+
                    |
                    v
    +----------------------------------+
    | Service Objective Model          |
    +----------------------------------+
                    |
                    v
    +----------------------------------+
