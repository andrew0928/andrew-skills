positioning: |
  此 domain 聚焦在 API 契約與 distributed workflow 的設計，不混進微服務平台治理、
  security policy、permission model、SLO 與整體營運治理等專屬領域內容。它的定位是把
  domain lifecycle、message flow、retry 與 worker 協作收斂成一套可設計、可驗證、
  可衡量的 distributed contract 方法。
main_flow:
  description: |
    主流程從問題與互動模型開始，逐步收斂到 contract surface、state machine、
    correctness boundary、worker topology、scenario mapping 與 metrics，最後再用
    failure-aware POC 驗證這份設計是否真的成立。
  steps:
    - "Problem Analysis"
    - "Domain And Interaction Modeling"
    - "Contract Surfaces"
    - "State Machine And Delivery Semantics"
    - "Correctness And Coordination"
    - "Worker And Runtime Topology"
    - "Scenario Mapping"
    - "Metrics"
    - "POC"
    - "Evaluation"
