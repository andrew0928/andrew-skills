positioning: |
  此 domain 聚焦在整體 microservice architecture 與 migration 的規劃，不混進單一 API
  契約、security policy、permission model 或 SLO 控制細節。它的定位是回答「是否該做
  微服務」、「要怎麼切」、「要怎麼分階段遷移」，以及「平台、runtime、交付流程要準備到什麼程度」。
main_flow:
  description: |
    主流程從問題與微服務適配性開始，逐步收斂到 boundary、migration strategy、
    platform capability、runtime/hosting 與 delivery model，最後再用高風險 POC 驗證
    技術與團隊是否真能承接這個架構。
  steps:
    - "Problem Analysis"
    - "Microservice Fit"
    - "Service Boundaries"
    - "Migration Strategy"
    - "Platform Capabilities"
    - "Runtime And Hosting Model"
    - "Delivery And Operability Model"
    - "POC"
    - "Evaluation"
  ascii_chart: |
    +----------------------------------+
    | Problem Analysis                 |
    +----------------------------------+
                    |
                    v
    +----------------------------------+
    | Microservice Fit                 |
    +----------------------------------+
                    |
                    v
    +----------------------------------+
    | Service Boundaries               |
    +----------------------------------+
                    |
                    v
    +----------------------------------+
    | Migration Strategy               |
    +----------------------------------+
                    |
                    v
    +----------------------------------+
    | Platform Capabilities            |
    +----------------------------------+
                    |
                    v
    +----------------------------------+
    | Runtime And Hosting Model        |
    +----------------------------------+
                    |
                    v
    +----------------------------------+
