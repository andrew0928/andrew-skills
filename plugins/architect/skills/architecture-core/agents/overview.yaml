positioning: |
  此 domain 保留所有 cross-domain 的 core 方法，不混進 API lifecycle、security policy、
  SLO 與運維治理等專屬領域內容。它的定位是在問題還太早、太廣、或還不適合直接套用
  domain-specific skill 時，先把架構思考收斂成穩定模型、資料與邊界設計，以及可驗證的
  POC 與評估方式。
main_flow:
  description: |
    主流程聚焦在從問題定義一路走到可量測驗證的八個步驟，目的不是直接給出某個特定
    領域的答案，而是先把架構題拆成可分析、可建模、可驗證、可回頭評估的核心工作流。
  steps:
    - "Problem Analysis"
    - "Modeling"
    - "Data And Storage Design"
    - "Class And Boundary Design"
    - "Scenario And Flow Mapping"
    - "Metrics And Theory Limits"
    - "POC"
    - "Evaluation"
  ascii_chart: |
    +---------------------------+
    | Problem Analysis          |
    +---------------------------+
