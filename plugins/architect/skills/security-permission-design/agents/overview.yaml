positioning: |
  此 domain 聚焦在 security 與 permission 的設計，不混進 API lifecycle、distributed
  workflow、SLO、微服務平台治理等其他專屬領域內容。它的定位是先釐清 trust boundary，
  再把 authentication、authorization、credential、enforcement 與 permission
  management 收斂成一套可設計、可驗證、可營運的安全模型。
main_flow:
  description: |
    主流程從 threat model 與 trust boundary 開始，逐步收斂到 identity、authorization、
    token/key 設計、enforcement boundary、permission scaling 與 audit/ops，最後再用
    hostile-path POC 驗證安全模型是否真的能成立。
  steps:
    - "Problem Analysis"
    - "Trust Boundary And Threat Model"
    - "Identity And Authentication"
    - "Authorization Model"
    - "Token, Key, And Credential Design"
    - "Enforcement Boundaries"
    - "Permission Management And Scaling"
    - "Operational Controls And Audit"
    - "POC"
    - "Evaluation"
  ascii_chart: |
    +------------------------------------+
    | Problem Analysis                   |
    +------------------------------------+
                    |
                    v
    +------------------------------------+
    | Trust Boundary And Threat Model    |
    +------------------------------------+
                    |
